<style id="chatgpt-v10-21-mobile-payment-fix">
/* v10.21: компактные мобильные дашборды и аккуратный платежный блок */
.payment-source-card{transition:background-color .18s ease,border-color .18s ease,box-shadow .18s ease;}
.payment-source-card:hover{border-color:#cbd5e1;background:#fbfdff;}
.payment-source-card label{align-items:center!important;gap:14px!important;}
.payment-toggle-switch{appearance:none;-webkit-appearance:none;width:42px;height:24px;border-radius:9999px;background:#cbd5e1;position:relative;display:inline-block;flex:0 0 42px;cursor:pointer;transition:background-color .18s ease,box-shadow .18s ease;box-shadow:inset 0 0 0 1px rgba(15,23,42,.08);}
.payment-toggle-switch:before{content:"";position:absolute;width:18px;height:18px;left:3px;top:3px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(15,23,42,.25);transition:transform .18s ease;}
.payment-toggle-switch:checked{background:#0f172a;}
.payment-toggle-switch:checked:before{transform:translateX(18px);}
.payment-context-card p{line-height:1.3;}
.payment-calc-card .divide-y>*{padding-top:.4rem!important;padding-bottom:.4rem!important;}
@media (min-width:768px){
  .payment-source-card{padding:12px 14px!important;}
  .payment-source-card b{font-size:14px!important;}
  .payment-source-card p{font-size:11px!important;}
}
@media (max-width:767px){
  .mobile-dashboard-metrics{display:grid!important;grid-template-columns:repeat(2,minmax(0,1fr))!important;gap:8px!important;}
  .mobile-dashboard-metrics>*{min-height:58px!important;padding:10px!important;border-radius:14px!important;}
  .mobile-dashboard-metrics p{line-height:1.25!important;}
  .mobile-dashboard-metrics p:first-child{font-size:10px!important;}
  .mobile-dashboard-metrics [class*="text-3xl"],
  .mobile-dashboard-metrics [class*="text-2xl"],
  .mobile-dashboard-metrics [class*="text-xl"]{font-size:18px!important;line-height:1.05!important;}
  .mobile-dashboard-metrics .mt-3{margin-top:6px!important;}
  .mobile-dashboard-metrics .mb-2,.mobile-dashboard-metrics .mb-3{margin-bottom:4px!important;}
  .lk-mobile-billing-cards{grid-template-columns:repeat(2,minmax(0,1fr))!important;gap:8px!important;}
  .lk-mobile-billing-cards>*{min-height:54px!important;padding:9px 10px!important;border-radius:14px!important;}
  .lk-mobile-billing-cards p:first-child{font-size:9px!important;margin-bottom:3px!important;}
  .lk-mobile-billing-cards p:nth-child(2){font-size:17px!important;line-height:1.05!important;margin-bottom:3px!important;}
  .payment-source-card{padding:10px 12px!important;}
  .payment-source-card label{gap:12px!important;}
  .payment-toggle-switch{width:40px;height:22px;flex-basis:40px;}
  .payment-toggle-switch:before{width:16px;height:16px;}
  .payment-toggle-switch:checked:before{transform:translateX(18px);}
}
</style>

<style id="chatgpt-v10-24-payment-layout-fix">
/* v10.24: компактная оплата, переключатели по центру, выбор основания из документов */
.payment-source-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px;white-space:nowrap;}
.payment-source-title{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:#475569;line-height:1;}
.payment-source-available{font-size:11px;font-weight:700;line-height:1;white-space:nowrap;}
.payment-source-row{display:grid;grid-template-columns:minmax(0,1fr) 48px;align-items:center;gap:10px;}
.payment-toggle-switch-centered{justify-self:center;align-self:center;margin:0!important;}
.payment-amount-input{width:100%;border-radius:10px;border:1px solid #e2e8f0;padding:9px 10px;font-size:14px;font-weight:700;line-height:1.2;transition:border-color .18s ease,background-color .18s ease,box-shadow .18s ease;color:#0f172a;}
.payment-amount-input-active{background:#fff;}
.payment-amount-input-disabled{background:#f8fafc;color:#64748b;}
.payment-amount-input-blue:focus{outline:none;border-color:#bfdbfe;box-shadow:0 0 0 3px rgba(191,219,254,.55);}
.payment-amount-input-green:focus{outline:none;border-color:#bbf7d0;box-shadow:0 0 0 3px rgba(187,247,208,.55);}
.lk-mobile-billing-cards{grid-template-columns:repeat(2,minmax(0,1fr))!important;}
.lk-mobile-billing-cards>*{min-width:0!important;}
@media (max-width:767px){
  .payment-source-card{padding:10px!important;}
  .payment-source-head{margin-bottom:7px;}
  .payment-source-title,.payment-source-available{font-size:10px;letter-spacing:.04em;}
  .payment-source-row{grid-template-columns:minmax(0,1fr) 44px;gap:8px;}
  .payment-toggle-switch{width:38px!important;height:22px!important;flex-basis:38px!important;}
  .payment-toggle-switch:before{width:16px!important;height:16px!important;left:3px!important;top:3px!important;}
  .payment-toggle-switch:checked:before{transform:translateX(16px)!important;}
  .payment-amount-input{padding:8px 9px;font-size:13px;}
}
</style>

<style id="chatgpt-v10-25-payment-final-layout">
/* v10.25: баланс/бонусы в одну строку и переключатели слева от суммы */
.lk-billing-summary{display:grid!important;grid-template-columns:repeat(2,minmax(0,1fr))!important;gap:8px!important;}
@media (min-width:768px){.lk-billing-summary{gap:16px!important;}}
.lk-billing-summary .billing-summary-card{min-height:64px!important;}
@media (max-width:640px){.lk-billing-summary .billing-summary-card{padding:10px!important;border-radius:12px!important;min-height:58px!important;} .lk-billing-summary .billing-summary-title{font-size:9px!important;margin-bottom:5px!important;} .lk-billing-summary .billing-summary-value{font-size:18px!important;line-height:1!important;margin-bottom:5px!important;}}
.payment-source-row{grid-template-columns:44px minmax(0,1fr)!important;align-items:center!important;}
.payment-source-row .payment-toggle-switch{grid-column:1!important;grid-row:1!important;justify-self:start!important;align-self:center!important;margin:0!important;}
.payment-source-row .payment-amount-input{grid-column:2!important;grid-row:1!important;min-width:0!important;}
.payment-toggle-switch-centered{justify-self:start!important;}
.payment-source-head{display:flex!important;align-items:center!important;justify-content:space-between!important;gap:8px!important;white-space:nowrap!important;}
.payment-source-title{flex:0 0 auto!important;text-align:left!important;}
.payment-source-available{flex:0 0 auto!important;text-align:right!important;margin-left:auto!important;}
@media (max-width:640px){.payment-source-row{grid-template-columns:40px minmax(0,1fr)!important;gap:8px!important;} .payment-source-head{gap:6px!important;} .payment-source-title,.payment-source-available{font-size:10px!important;} }
</style>

<style id="chatgpt-v10-23-payment-toggle-compact">
/* v10.23: компактные переключатели бонусов/баланса и редактирование суммы прямо в карточке */
.payment-source-compact{min-height:auto!important;}
.payment-source-compact .payment-toggle-switch{width:38px!important;height:22px!important;min-width:38px!important;flex:0 0 38px!important;box-sizing:border-box!important;padding:0!important;overflow:hidden!important;margin:0!important;}
.payment-source-compact .payment-toggle-switch:before{width:16px!important;height:16px!important;left:3px!important;top:3px!important;}
.payment-source-compact .payment-toggle-switch:checked:before{transform:translateX(16px)!important;}
.payment-source-compact input[disabled]{opacity:1!important;cursor:default!important;}
@media (max-width:767px){
  .payment-source-compact{padding:9px!important;border-radius:12px!important;}
  .payment-source-compact .payment-toggle-switch{width:36px!important;height:20px!important;min-width:36px!important;flex-basis:36px!important;}
  .payment-source-compact .payment-toggle-switch:before{width:14px!important;height:14px!important;left:3px!important;top:3px!important;}
  .payment-source-compact .payment-toggle-switch:checked:before{transform:translateX(16px)!important;}
  .payment-source-compact input[type="text"],
  .payment-source-compact input:not([type]){font-size:13px!important;padding:7px 9px!important;}
}

<script id="chatgpt-v10-27-green-payment-buttons">
(function(){
  const money = value => new Intl.NumberFormat('ru-RU').format(Math.max(0, Math.round(Number(value)||0))) + ' ₽';
  const parseAmount = text => {
    const matches = String(text || '').match(/\d[\d\s]{2,}\s*₽/g) || [];
    if(!matches.length) return 0;
    const clean = matches
      .map(v => Number(String(v).replace(/[^0-9]/g,'')) || 0)
      .filter(v => v > 0);
    return clean.length ? Math.max.apply(null, clean) : 0;
  };
  function amountFromContext(btn){
    const row = btn.closest('tr');
    if(row){
      const amount = parseAmount(row.textContent);
      if(amount) return amount;
    }
    let node = btn.parentElement;
    for(let i=0; i<7 && node; i++, node=node.parentElement){
      const amount = parseAmount(node.textContent);
      if(amount) return amount;
    }
    return 0;
  }
  function patchPaymentButtons(root){
    (root || document).querySelectorAll('button').forEach(btn => {
      const text = (btn.textContent || '').replace(/\s+/g,' ').trim();
      const isPay = /^(Оплатить|Оплатить заказ|Перейти к оплате)(\s|$)/i.test(text) || btn.id === 'lkPaySubmit';
      if(!isPay || /Пополнить/i.test(text)) return;
      btn.classList.add('lk-pay-green-btn');
      if(btn.id === 'lkPaySubmit') return;
      if(/^Оплатить\s+(остаток|[0-9])/i.test(text)) return;
      const amount = amountFromContext(btn);
      if(amount){
        btn.textContent = 'Оплатить ' + money(amount);
      }
    });
  }
  function schedulePatch(){ window.setTimeout(() => patchPaymentButtons(document), 30); }
  if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', schedulePatch); else schedulePatch();
  document.addEventListener('click', schedulePatch, true);
  const observer = new MutationObserver(schedulePatch);
  observer.observe(document.documentElement, {childList:true, subtree:true, characterData:true});
})();
</script>

<script id="chatgpt-v10-29-payment-modal-bugfix">
(function(){
  const parseMoney = text => Number(String(text||'').replace(/[^0-9]/g,'')) || 0;
  const money = value => new Intl.NumberFormat('ru-RU').format(Math.max(0, Math.round(Number(value)||0))) + ' ₽';
  function ensureSbp(){
    document.querySelectorAll('.lk-pay-modal').forEach(modal => {
      const actions = modal.querySelector('.lk-pay-actions');
      const submit = modal.querySelector('#lkPaySubmit');
      if(!actions || !submit) return;
      let sbp = modal.querySelector('#lkPaySbpButton');
      if(!sbp){
        sbp = document.createElement('button');
        sbp.type = 'button';
        sbp.id = 'lkPaySbpButton';
        sbp.className = 'lk-pay-sbp-btn lk-pay-green-btn';
        sbp.innerHTML = '<span class="lk-sbp-logo" aria-hidden="true"></span><span class="lk-sbp-text">Оплатить по СБП</span>';
        submit.insertAdjacentElement('afterend', sbp);
      }
      const rest = parseMoney((modal.querySelector('#lkCalcRest')||{}).textContent);
      const text = sbp.querySelector('.lk-sbp-text');
      if(text) text.textContent = rest > 0 ? 'Оплатить по СБП ' + money(rest) : 'СБП не требуется';
      sbp.disabled = rest <= 0;
      sbp.style.opacity = rest > 0 ? '1' : '.55';
      sbp.onclick = function(){
        const method = modal.querySelector('#lkPayMethod');
        if(method) method.value = 'СБП';
        const toast = modal.querySelector('#lkPayToast');
        if(toast){
          toast.textContent = rest > 0 ? 'Переход к оплате по СБП на сумму ' + money(rest) + '.' : 'Сумма закрыта бонусами и балансом. СБП не требуется.';
          toast.classList.add('show');
        }
      };
    });
  }
  function openFromButton(btn, e){
    if(btn.closest('.lk-pay-modal')) return false;
    const label = (btn.textContent||'').replace(/\s+/g,' ').trim();
    if(!/^Оплатить(\s|$)/i.test(label) || /Пополнить/i.test(label)) return false;
    const row = btn.closest('tr');
    const context = row || btn.closest('[class*=rounded],[class*=border],section,article,div') || btn.parentElement;
    const contextText = (context ? context.textContent : label).replace(/\s+/g,' ').trim();
    const explicit = label.match(/\d[\d\s]*₽/);
    const amounts = contextText.match(/\d[\d\s]*₽/g) || [];
    const amount = explicit ? explicit[0] : (amounts.find(v => parseMoney(v)>0) || '0 ₽');
    const basisMatch = contextText.match(/(Заказ\s*№\s*\d+[^\n]{0,80}?Сч[её]т\s*№\s*\d+|Сч[её]т\s*№\s*\d+|№\s*\d+)/i);
    const basis = basisMatch ? basisMatch[0] : contextText.slice(0,120);
    if(typeof window.lkOpenPayModal === 'function'){
      e.preventDefault(); e.stopPropagation(); if(e.stopImmediatePropagation) e.stopImmediatePropagation();
      window.lkOpenPayModal({basis, amount});
      setTimeout(ensureSbp,0);
      return true;
    }
    return false;
  }
  document.addEventListener('click', function(e){
    const btn = e.target.closest('button');
    if(btn) openFromButton(btn, e);
  }, true);
  ['input','change','click'].forEach(evt => document.addEventListener(evt, () => setTimeout(ensureSbp,0), true));
  new MutationObserver(ensureSbp).observe(document.documentElement,{childList:true,subtree:true,characterData:true});
  if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', ensureSbp); else ensureSbp();
})();
</script>

  </body>
</html>
